# APEX Pipeline Master Orchestrator
# Triggers on every push/PR and runs all 6 integration phases in sequence
name: APEX Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
  SUPERMEMORY_API_KEY: ${{ secrets.SUPERMEMORY_API_KEY }}
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

jobs:
  # ════════════════════════════════════════
  # PHASE 1 — SUPABASE SCHEMA SYNC
  # ════════════════════════════════════════
  schema-sync:
    name: "1️⃣  Schema Sync → Supabase"
    runs-on: ubuntu-latest
    outputs:
      supabase-branch: ${{ steps.branch.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/

      - name: Determine Supabase branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "name=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "name=main" >> $GITHUB_OUTPUT
          fi

      - name: Create preview branch for PRs
        if: github.event_name == 'pull_request'
        run: |
          supabase branches create pr-${{ github.event.number }} \
            --project-ref $SUPABASE_PROJECT_ID || true

      - name: Run migrations
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            supabase db push --branch pr-${{ github.event.number }}
          else
            supabase db push
          fi

      - name: Generate TypeScript types
        run: |
          mkdir -p types
          supabase gen types typescript --schema public > types/supabase.ts

      - name: Commit types if changed
        run: |
          git config user.name "APEX Pipeline Bot"
          git config user.email "apex-bot@glaciereq.dev"
          git add types/supabase.ts
          git diff --staged --quiet || git commit -m "chore: regen Supabase types [skip ci]" && git push

  # ════════════════════════════════════════
  # PHASE 2 — VERCEL DEPLOYMENT
  # ════════════════════════════════════════
  deploy-vercel:
    name: "2️⃣  Deploy → Vercel"
    runs-on: ubuntu-latest
    needs: schema-sync
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=${{ github.event_name == 'pull_request' && 'preview' || 'production' }} \
            --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --token=$VERCEL_TOKEN ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN ${{ github.ref == 'refs/heads/main' && '--prod' || '' }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🌲 APEX Preview Ready',
                '',
                `**Vercel:** ${{ steps.deploy.outputs.url }}`,
                `**Supabase branch:** \`pr-${{ github.event.number }}\``,
                '',
                '_Full-stack preview environment live. All pipeline integrations active._'
              ].join('\n')
            })

  # ════════════════════════════════════════
  # PHASE 3 — LOG DEPLOYMENT TO SUPABASE
  # ════════════════════════════════════════
  log-deployment:
    name: "3️⃣  Log → Supabase deployments"
    runs-on: ubuntu-latest
    needs: deploy-vercel
    steps:
      - name: Insert deployment record
        run: |
          curl -sX POST "${SUPABASE_URL}/rest/v1/deployments" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$( jq -n \
              --arg repo "${{ github.repository }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg sha "${{ github.sha }}" \
              --arg url "${{ needs.deploy-vercel.outputs.preview-url }}" \
              --arg env "${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}" \
              --argjson pr "${{ github.event.number || 'null' }}" \
              '{repo_id: null, branch: $branch, commit_sha: $sha, deployment_url: $url, environment: $env, status: "success", metadata: {repo: $repo, pr_number: $pr, actor: "${{ github.actor }}", run_id: "${{ github.run_id }}"}}')"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

  # ════════════════════════════════════════
  # PHASE 4 — SENTRY RELEASE
  # ════════════════════════════════════════
  sentry-release:
    name: "4️⃣  Release → Sentry"
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Sentry release
        run: |
          curl -sX POST "https://sentry.io/api/0/organizations/${SENTRY_ORG}/releases/" \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"version":"${{ github.sha }}","projects":["'"${SENTRY_PROJECT}"'"],"refs":[{"repository":"${{ github.repository }}","commit":"${{ github.sha }}"}]}'

      - name: Finalize deploy in Sentry
        run: |
          curl -sX POST "https://sentry.io/api/0/organizations/${SENTRY_ORG}/releases/${{ github.sha }}/deploys/" \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"environment":"production","url":"${{ needs.deploy-vercel.outputs.preview-url }}"}'

  # ════════════════════════════════════════
  # PHASE 5 — SUPERMEMORY WRITE
  # ════════════════════════════════════════
  memory-write:
    name: "5️⃣  Write → Supermemory"
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect diff summary
        id: diff
        run: |
          SUMMARY=$(git log -1 --pretty=format:"%s" ${{ github.sha }})
          CHANGES=$(git diff ${{ github.event.before }} ${{ github.sha }} --stat | tail -1)
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT
          echo "changes=${CHANGES}" >> $GITHUB_OUTPUT

      - name: Write repo_knowledge to Supermemory
        run: |
          curl -sX POST "https://api.supermemory.ai/v1/memories" \
            -H "Authorization: Bearer ${SUPERMEMORY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$( jq -n \
              --arg content "Repository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nSummary: ${{ steps.diff.outputs.summary }}\nChanges: ${{ steps.diff.outputs.changes }}\nDeployment: ${{ needs.deploy-vercel.outputs.preview-url }}" \
              --arg repo "${{ github.repository }}" \
              --arg sha "${{ github.sha }}" \
              '{class: "repo_knowledge", content: $content, metadata: {repo: $repo, commit: $sha}}')"

  # ════════════════════════════════════════
  # PHASE 6 — MOTHERDUCK ETL
  # ════════════════════════════════════════
  motherduck-etl:
    name: "6️⃣  ETL → MotherDuck"
    runs-on: ubuntu-latest
    needs: [log-deployment, sentry-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install DuckDB CLI
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip
          unzip -q duckdb_cli-linux-amd64.zip
          chmod +x duckdb && sudo mv duckdb /usr/local/bin/

      - name: Run ETL to MotherDuck
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          duckdb -c "
            ATTACH 'md:?motherduck_token=${MOTHERDUCK_TOKEN}' AS md;
            ATTACH '${SUPABASE_DB_URL}' AS sb (TYPE POSTGRES);
            CREATE OR REPLACE TABLE md.apex_deployments AS
              SELECT d.*, r.name repo_name, r.owner repo_owner, r.tier
              FROM sb.deployments d
              LEFT JOIN sb.repos r ON d.repo_id = r.id
              WHERE d.created_at > current_date - INTERVAL '90 days';
            CREATE OR REPLACE TABLE md.apex_incidents AS
              SELECT i.*, r.name repo_name
              FROM sb.incident_log i
              LEFT JOIN sb.repos r ON i.repo_id = r.id
              WHERE i.severity IN ('HIGH','CRITICAL')
                 OR i.created_at > current_date - INTERVAL '30 days';
            CREATE OR REPLACE TABLE md.apex_repos AS SELECT * FROM sb.repos;
            CREATE OR REPLACE VIEW md.deployment_health AS
              SELECT repo_name,
                     COUNT(*) total_deploys,
                     ROUND(100.0*SUM(CASE WHEN status='success' THEN 1 ELSE 0 END)/COUNT(*),2) success_rate,
                     AVG(build_time_ms) avg_build_ms
              FROM md.apex_deployments
              GROUP BY repo_name ORDER BY success_rate;
          "
